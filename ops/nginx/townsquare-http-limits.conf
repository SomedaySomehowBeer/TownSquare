# Load from Nginx's http context (for Debian/Ubuntu, /etc/nginx/conf.d/).
map $uri $townsquare_live_client {
    default "";
    /live $binary_remote_addr;
}

limit_conn_zone $townsquare_live_client zone=townsquare_live_connections:10m;
limit_req_zone $townsquare_live_client zone=townsquare_live_handshakes:10m rate=30r/m;
