<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create a TownSquare</title>
    <link rel="stylesheet" href="/widget.css" />
  </head>
  <body>
    <main class="hosted-shell">
      <section class="hosted-panel" aria-labelledby="register-title">
        <p class="eyebrow">Hosted TownSquare</p>
        <h1 id="register-title">Register your website</h1>
        <p class="hosted-copy">
          Add your site URL, get a snippet, paste it into your page. No account required.
        </p>

        <form class="hosted-form" id="register-form">
          <label>
            <span>Website URL</span>
            <input
              id="site-origin"
              name="origin"
              type="url"
              placeholder="https://example.com"
              autocomplete="url"
              required
            />
          </label>
          <label>
            <span>Name</span>
            <input id="site-name" name="name" type="text" placeholder="My site" maxlength="80" />
          </label>
          <button type="submit">Create TownSquare</button>
        </form>

        <p class="hosted-status" id="register-status" role="status"></p>

        <section class="hosted-result" id="register-result" hidden>
          <h2>Paste this into your website</h2>
          <textarea id="embed-snippet" readonly rows="8"></textarea>
          <div class="hosted-actions">
            <button type="button" id="copy-snippet">Copy snippet</button>
            <a id="admin-link" href="#">Open admin</a>
          </div>
          <p class="hosted-note">
            Keep the admin link private. It is the password for moderation and settings.
          </p>
        </section>
      </section>
    </main>

    <script type="module" src="/hosted-register.mjs"></script>
  </body>
</html>
