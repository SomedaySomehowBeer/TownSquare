name: build
# Manual deploys for now. GitHub-hosted runners can't reach the Tailscale-only
# droplet, so there is NO SSH deploy step here — this workflow only validates
# that the Docker image builds. To deploy, on the droplet:
#   cd /opt/townsquare && git pull && docker compose up -d --build
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: townsquare:ci

# Later, to switch to pull-based auto-deploy (e.g. Watchtower on the droplet):
#   - add a docker/login-action step (registry ghcr.io, username ${{ github.actor }},
#     password ${{ secrets.GITHUB_TOKEN }}),
#   - set `push: true` and `tags: ghcr.io/somedaysomehowbeer/townsquare:latest`,
#   - add `permissions: { contents: read, packages: write }` to this job.
